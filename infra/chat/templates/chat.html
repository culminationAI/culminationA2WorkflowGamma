}

// ── Command bar state ────────────────────────────────────────────────────────
function updateCmdBar() {
  const isLive   = activeChatId ? liveChats.has(activeChatId) : false;
  const input    = document.getElementById('cmd-input');
  const btnSend  = document.getElementById('btn-send');
  const btnPause  = document.getElementById('btn-pause');
  const btnResume = document.getElementById('btn-resume');
  const btnEnd    = document.getElementById('btn-end');
  const btnStep   = document.getElementById('btn-step');
  const btnMod    = document.getElementById('btn-moderator');
  const dot      = document.getElementById('state-dot');
  const stateText = document.getElementById('state-text');
  const ctxEl    = document.getElementById('ctx-status');

  if (!activeChatId) {
    input.disabled    = true;
    input.placeholder = 'Type to send or /command...';
    btnSend.disabled  = true;
    btnPause.disabled = true;
    btnResume.disabled = true;
    btnResume.style.display = 'none';
    btnPause.style.display = '';
    btnEnd.disabled   = true;
    btnStep.disabled  = true;
    btnMod.disabled   = true;
    dot.className     = 'cmd-state-dot idle';
    stateText.textContent = '';
    ctxEl.textContent = '';
    return;
  }

  if (!isLive) {
    input.disabled    = true;
    input.placeholder = 'Chat ended';
    btnSend.disabled  = true;
    btnPause.disabled = true;
    btnResume.disabled = true;
    btnResume.style.display = 'none';
    btnPause.style.display = '';
    btnEnd.disabled   = true;
    btnStep.disabled  = true;
    btnMod.disabled   = true;
    dot.className     = 'cmd-state-dot ended';
    const chatData = allChats.find(c => c.chat_id === activeChatId) || {};
    const turns = chatData.turn_count || 0;
    const tok   = fmtTokens(liveStatus.total_tokens || 0);
    // Show resurrect button for ended chats
    stateText.innerHTML = `Ended &middot; ${turns} turns${tok !== '0' ? ' &middot; ' + esc(tok) + ' tokens' : ''} &middot; <button class="cmd-btn" style="height:18px;font-size:11px;padding:0 6px;" onclick="resurrectChat()">+ Turns</button>`;
    ctxEl.textContent = '';
    return;
  }

  // Live chat — 3 states: active (running), paused, ended
  input.disabled    = false;
  input.placeholder = 'Type to send or /command...';
  btnSend.disabled  = false;
  btnEnd.disabled   = !moderatorMode;
  btnStep.disabled  = false;
  btnMod.disabled   = false;
  btnStep.textContent = stepMode ? 'Step' : 'Live';

  const state    = liveStatus.state || 'active';
  const isPaused = state === 'paused';
  // active = accepting messages + agents running; paused = loop paused
  btnPause.style.display  = isPaused ? 'none' : '';
  btnPause.disabled       = !moderatorMode;
  btnResume.style.display = isPaused ? '' : 'none';
  btnResume.disabled      = false;

  const turn     = liveStatus.turn  || 0;
  const chatData = _chatCache[activeChatId] || {};
  const maxT     = liveStatus.max_turns || chatData.max_turns || 0;
  const tok      = fmtTokens(liveStatus.total_tokens || 0);
  const turnStr  = maxT ? `${turn}/${maxT}` : String(turn);
  const turnsBtn = `<button class="turns-add-btn" onclick="showTurnsMenu(event)" title="Add turns">+</button>`;

  if (state === 'paused') {
    dot.className = 'cmd-state-dot paused';
    stateText.innerHTML = `Paused &middot; Turn ${esc(turnStr)}${turnsBtn} &middot; ${esc(tok)} tokens`;
  } else if (state === 'ended') {
    dot.className = 'cmd-state-dot ended';
    stateText.innerHTML = `Ended &middot; ${esc(String(turn))} turns &middot; ${esc(tok)} tokens`;
  } else {
    // active / running — treat as equivalent
    dot.className = 'cmd-state-dot running';
    stateText.innerHTML = `Active &middot; Turn ${esc(turnStr)}${turnsBtn} &middot; ${esc(tok)} tokens`;
  }

  // Context meter: show max across all agents
  const ctxMax = liveStatus.max_context || 200000;
  const allCtx = Object.values(liveStatus.context_agents || {});
  const legacyMax = Math.max(liveStatus.context_a || 0, liveStatus.context_b || 0);
  const ctxMain = allCtx.length > 0 ? Math.max(...allCtx) : legacyMax;
  if (ctxMain > 0) {
    ctxEl.textContent = `ctx: ${fmtTokens(ctxMain)}/${fmtTokens(ctxMax)}`;
  } else {
    ctxEl.textContent = '';
  }
}

// ── Turns menu ────────────────────────────────────────────────────────────────
function showTurnsMenu(event) {
  event.stopPropagation();
  // Toggle: if menu already open, close it and return
  const existing = document.querySelector('.turns-menu');
  if (existing) { existing.remove(); return; }

  const btn = event.currentTarget;
  const rect = btn.getBoundingClientRect();
  const menu = document.createElement('div');
  menu.className = 'turns-menu';

  const options = [
    { label: '+5',     value: 5 },
    { label: '+10',    value: 10 },
    { label: '+20',    value: 20 },
    { label: 'Custom', value: 0 },
  ];

  for (const opt of options) {
    const item = document.createElement('div');
    item.className = 'turns-menu-item';
    item.textContent = opt.label;
    item.addEventListener('click', (e) => {
      e.stopPropagation();
      menu.remove();
      if (opt.value === 0) {
        const n = parseInt(prompt('Add how many turns?', '10'), 10);
        if (n > 0) addTurnsToChat(n);
      } else {
        addTurnsToChat(opt.value);
      }
    });
    menu.appendChild(item);
  }

  // Append to body with fixed positioning so it floats above everything
  document.body.appendChild(menu);
  menu.style.position = 'fixed';
  menu.style.zIndex = '9999';
  menu.style.left = rect.left + 'px';
  // Position above the button; offsetHeight is available after append
  menu.style.top = (rect.top - menu.offsetHeight - 4) + 'px';
}

async function addTurnsToChat(n) {
  if (!activeChatId || !n) return;
  try {
    const r = await fetch(`/api/chats/${encodeURIComponent(activeChatId)}/add-turns`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ count: n }),
    });
    if (r.ok) {
      const data = await r.json();
      // Update local cache so UI reflects immediately
      if (_chatCache[activeChatId]) {
        _chatCache[activeChatId].max_turns = data.max_turns || ((_chatCache[activeChatId].max_turns || 0) + n);
      }
      // Update per-chat state; liveStatus already points to getLs(activeChatId)
      liveStatus.max_turns = data.max_turns || ((liveStatus.max_turns || 0) + n);
      updateCmdBar();
    }
  } catch (e) {
    console.error('addTurnsToChat error:', e);
  }
}

async function resurrectChat() {
  if (!activeChatId) return;
  const n = parseInt(prompt('How many additional turns?', '10'), 10);
  if (!n || n <= 0) return;
  try {
    const r = await fetch(`/api/chats/${encodeURIComponent(activeChatId)}/resurrect`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ additional_turns: n }),
    });
    if (r.ok) {
      const data = await r.json();
      if (data.chat_id) {
        await loadChatList();
        selectChat(data.chat_id);
      }
    }
  } catch (e) {
    console.error('resurrectChat error:', e);
  }
}

// ── Select a chat ────────────────────────────────────────────────────────────
async function selectChat(chatId) {
  activeChatId = chatId;
  renderSidebar();

  // Always fetch full state from server (server is source of truth)
  const chat = await fetchChat(chatId);
  if (!chat) { showEmptyState(); updateCmdBar(); return; }

  // Cache for SSE turn appending
  _chatCache[chatId] = chat;

  // Point global liveStatus at this chat's per-chat state object
  liveStatus = getLs(chatId);

  // Seed per-chat state from API data for any live chat
  if (liveChats.has(chatId)) {
    liveStatus.state     = chat.state || liveStatus.state || 'active';
    liveStatus.max_turns = chat.max_turns || liveStatus.max_turns || 5;
    liveStatus.turn      = chat.turns ? chat.turns.length : (liveStatus.turn || 0);
  }

  // (new-chat-form removed — creation is prompt-based now)
  renderChatHeader(chat);
  renderMessages(chat);
  updateCmdBar();
}

// ── API ──────────────────────────────────────────────────────────────────────
async function fetchChats() {
  try {
    const r = await fetch('/api/chats');
    if (!r.ok) throw new Error(r.statusText);
    return await r.json();
  } catch (e) {
    console.error('fetchChats:', e);
    return [];
  }
}

async function fetchChat(chatId) {
  try {
    const r = await fetch(`/api/chats/${encodeURIComponent(chatId)}`);
    if (!r.ok) throw new Error(r.statusText);
    return await r.json();
  } catch (e) {
    console.error('fetchChat:', e);
    return null;
  }
}

async function loadChatList() {
  const chats = await fetchChats();
  allChats = chats;

  liveChats.clear();
  let activeLiveId = null;
  for (const c of chats) {
    if (c._live && !c.ended_at) {
      liveChats.add(c.chat_id);
      activeLiveId = c.chat_id;
      // Seed per-chat state from list data (coarse; selectChat will refine)
      const cls = getLs(c.chat_id);
      cls.state = c.state || 'active';
      cls.turn = c.turn_count || 0;
      cls.max_turns = c.max_turns || cls.max_turns || 0;
      cls.total_tokens = c.total_tokens || 0;
    }
  }

  filterChats(document.getElementById('search').value);

  if (activeLiveId && !activeChatId) {
    selectChat(activeLiveId);
  }
}

// ── SSE connection (events from server) ──────────────────────────────────────
function sseConnect() {
  if (eventSource) {
    eventSource.close();
    eventSource = null;
  }

  const url = `${SSE_URL}?last_id=${_lastEventId}`;
  eventSource = new EventSource(url);

  eventSource.onopen = () => {
    setWsStatus('connected');
    loadChatList();
  };

  eventSource.onerror = () => {
    setWsStatus('disconnected');
    if (eventSource && eventSource.readyState === EventSource.CLOSED) {
      setTimeout(sseConnect, 3000);
    }
  };

  // All event types including new N-agent events
  const evTypes = [
    'status', 'turn', 'chat_started', 'chat_ended', 'log_updated',
    'stream_start', 'stream_chunk', 'msg_status',
    // N-agent new events
    'phase_change', 'sync_status', 'agent_joined', 'turns_extended',
    'agent_msg', 'report_published',
  ];

  for (const evType of evTypes) {
    eventSource.addEventListener(evType, (e) => {
      _lastEventId = e.lastEventId || _lastEventId;
      try {
        const data = JSON.parse(e.data);
        handleSSEvent(data);
      } catch {}
    });
  }

  eventSource.addEventListener('ping', () => {});
}

// ── WebSocket (commands only, client → server) ───────────────────────────────
function wsConnect() {
  if (ws && (ws.readyState === WebSocket.CONNECTING || ws.readyState === WebSocket.OPEN)) return;
  try {
    ws = new WebSocket(WS_URL);
  } catch (e) {
    scheduleReconnect();
    return;
  }

  ws.onopen = () => {
    wsBackoff = 1000;
    if (wsReconnTimer) { clearTimeout(wsReconnTimer); wsReconnTimer = null; }
  };

  ws.onclose = () => scheduleReconnect();
  ws.onerror = () => {};

  ws.onmessage = (event) => {
    try {
      const msg = JSON.parse(event.data);
      if (msg.type === 'ack') { /* command acknowledged */ }
    } catch {}
  };
}

function scheduleReconnect() {
  if (wsReconnTimer) return;
  wsReconnTimer = setTimeout(() => {
    wsReconnTimer = null;
    wsBackoff = Math.min(wsBackoff * 2, 16000);
    wsConnect();
  }, wsBackoff);
}

function setWsStatus(state) {
  const dot   = document.getElementById('ws-dot');
  const label = document.getElementById('ws-label');
  dot.className = '';
  if (state === 'connected') {
    dot.classList.add('connected', 'live-pulse');
    label.textContent = 'live';
  } else if (state === 'disconnected') {
    dot.classList.add('disconnected');
    label.textContent = 'offline';
  } else {
    label.textContent = 'connecting';
  }
}

// ── SSE event handling ───────────────────────────────────────────────────────
function handleSSEvent(msg) {
  const type = msg.type;

  if (type === 'status') {
    // Write to the per-chat state object
    const ls = getLs(msg.chat_id);
    if (msg.state) ls.state = msg.state;
    if (msg.turn !== undefined) ls.turn = msg.turn;
    if (msg.max_turns) ls.max_turns = msg.max_turns;
    if (msg.total_tokens !== undefined) ls.total_tokens = msg.total_tokens;
    if (msg.permission_mode) ls.permission_mode = msg.permission_mode;
    if (msg.context_agents) {
      ls.context_agents = Object.assign(ls.context_agents || {}, msg.context_agents);
    }
    if (msg.context_a !== undefined) ls.context_a = msg.context_a;
    if (msg.context_b !== undefined) ls.context_b = msg.context_b;
    if (msg.max_context) ls.max_context = msg.max_context;

    if (msg.step_mode !== undefined) stepMode = msg.step_mode;
    if (msg.moderator_mode !== undefined) moderatorMode = msg.moderator_mode;
    if (msg.chat_id && msg.state) {
      const summary = allChats.find(c => c.chat_id === msg.chat_id);
      if (summary) summary.state = msg.state;
    }

    // Only update UI if this event is for the currently active chat
    if (msg.chat_id === activeChatId) {
      liveStatus = ls;
      updateCmdBar();
      updateHeaderAgents();
    }
    renderSidebar();
  }

  else if (type === 'stream_start') {
    const chatId = msg.chat_id;
    if (chatId !== activeChatId) return;

    const agents = _chatCache[chatId] ? _chatCache[chatId].agents : null;
    const speaker = msg.speaker || '?';
    const color = agentColorByName(speaker, agents);

    if (isPanelMode()) {
      // Panel mode: create streaming div inside the correct agent panel
      const panel = findPanel(speaker, ' .panel-messages');
      if (panel) {
        const div = document.createElement('div');
        div.className = 'turn streaming';
        div.dataset.streamingSpeaker = speaker;
        div.innerHTML = `
          <div class="turn-header">
            <span class="turn-speaker" style="color:${color}">${esc(speaker)}</span>
            <span class="turn-header-meta streaming-indicator">streaming...</span>
          </div>
          <div class="turn-text streaming-text"></div>`;
        panel.appendChild(div);
        panel.scrollTop = panel.scrollHeight;
        const statusEl = panel.parentElement.querySelector('.panel-status');
        if (statusEl) statusEl.textContent = 'streaming...';
      }
    } else {
      // Fallback: single-container streaming placeholder
      const container = document.getElementById('messages-container');
      if (!container || container.style.display === 'none') return;
      const slot = agentSlot(speaker, agents);
      const div = document.createElement('div');
      div.className = `turn turn-${slot} streaming`;
      div.id = 'streaming-turn';
      div.innerHTML = `
        <div class="turn-header">
          <span class="turn-speaker" style="color:${color}">${esc(speaker)}</span>
          <span class="turn-header-meta streaming-indicator">streaming...</span>
        </div>
        <div class="turn-text" id="streaming-text"></div>`;
      container.appendChild(div);
      container.scrollTop = container.scrollHeight;
    }
  }

  else if (type === 'stream_chunk') {
    const speaker = msg.speaker;

    if (isPanelMode() && speaker) {
      // Panel mode: append to correct panel's streaming text
      const panel = findPanel(speaker, ' .panel-messages');
      if (panel) {
        const streamEl = panel.querySelector('.streaming .streaming-text');
        if (streamEl) {
          streamEl.textContent += msg.chunk;
          panel.scrollTop = panel.scrollHeight;
        }
        return;
      }
    }

    // Fallback: old single-container
    const el = document.getElementById('streaming-text');
    if (!el) return;
    el.textContent += msg.chunk;
    const container = document.getElementById('messages-container');
    if (container) {
      const atBottom = container.scrollHeight - container.scrollTop - container.clientHeight < 100;
      if (atBottom) container.scrollTop = container.scrollHeight;
    }
  }

  else if (type === 'msg_status') {
    const status = msg.status;
    const speaker = msg.speaker || '';

    if (speaker === 'moderator' && status === 'delivered' && window._lastModMsgId) {
      const dEl = document.getElementById(window._lastModMsgId + '-d');
      if (dEl) dEl.classList.add('active');
    }
    if (speaker === 'moderator' && status === 'injected' && window._lastModMsgId) {
      const dEl = document.getElementById(window._lastModMsgId + '-d');
      if (dEl) { dEl.classList.add('active', 'injected'); }
      const parent = dEl ? dEl.parentElement : null;
      if (parent) {
        const firstCheck = parent.querySelector('.check');
        if (firstCheck) firstCheck.classList.add('injected');
      }
    }
  }

  else if (type === 'turn') {
    const chatId   = msg.chat_id;
    const turnData = msg.turn_data || msg;

    // Write turn state to the per-chat state object
    const turnLs = getLs(chatId);

    // Dedup: moderator turn already rendered optimistically
    if ((turnData.speaker || '') === 'moderator' && window._lastModMsgId) {
      const dEl = document.getElementById(window._lastModMsgId + '-d');
      if (dEl) dEl.classList.add('active');
      window._lastModMsgId = null;
      if (chatId && _chatCache[chatId]) {
        _chatCache[chatId].turns.push(turnData);
      }
      const summary = allChats.find(c => c.chat_id === chatId);
      if (summary) summary.turn_count = (summary.turn_count || 0) + 1;
      turnLs.turn = (turnLs.turn || 0) + 1;
      if (msg.total_tokens) turnLs.total_tokens = msg.total_tokens;
      if (chatId === activeChatId) { liveStatus = turnLs; updateCmdBar(); updateHeaderAgents(); }
      renderSidebar();
      return;
    }

    // Update per-agent context from turn event (backward compat + new)
    if (msg.context_a !== undefined) turnLs.context_a = msg.context_a;
    if (msg.context_b !== undefined) turnLs.context_b = msg.context_b;
    if (msg.max_context) turnLs.max_context = msg.max_context;
    if (msg.permission_mode) turnLs.permission_mode = msg.permission_mode;
    if (msg.context_agents) {
      turnLs.context_agents = Object.assign(turnLs.context_agents || {}, msg.context_agents);
    }
    // Also update single-agent context from turn speaker
    if (turnData.speaker && turnData.input_tokens) {
      turnLs.context_agents = turnLs.context_agents || {};
      turnLs.context_agents[turnData.speaker] = turnData.input_tokens;
    }

    // Update cached chat data
    if (chatId && _chatCache[chatId]) {
      _chatCache[chatId].turns.push(turnData);
      _chatCache[chatId].total_input_tokens =
        (_chatCache[chatId].total_input_tokens || 0) + (turnData.input_tokens || 0);
      _chatCache[chatId].total_output_tokens =
        (_chatCache[chatId].total_output_tokens || 0) + (turnData.output_tokens || 0);
    }

    const summary = allChats.find(c => c.chat_id === chatId);
    if (summary) {
      summary.turn_count = (summary.turn_count || 0) + 1;
      summary.total_tokens = (summary.total_tokens || 0) +
        (turnData.output_tokens || 0) + (turnData.input_tokens || 0);
    }

    turnLs.turn = (turnLs.turn || 0) + 1;
    if (msg.total_tokens) turnLs.total_tokens = msg.total_tokens;

    if (chatId === activeChatId) {
      liveStatus = turnLs;
      const agents = _chatCache[chatId] ? _chatCache[chatId].agents : null;
      appendTurnToView(turnData, agents);
      if (_chatCache[chatId]) renderChatHeader(_chatCache[chatId]);
    }

    renderSidebar();
    updateCmdBar();
    updateHeaderAgents();
  }

  else if (type === 'chat_started') {
    const chatId = msg.chat_id;
    if (!chatId) return;

    liveChats.add(chatId);

    const synth = {
      chat_id:     chatId,
      topic:       msg.topic   || 'Live chat',
      agents:      msg.agents  || {},
      started_at:  msg._ts || new Date().toISOString(),
      ended_at:    null,
      turn_count:  0,
      total_tokens: 0,
      facts_count: 0,
      _live:       true,
    };
    const existing = allChats.findIndex(c => c.chat_id === chatId);
    if (existing >= 0) allChats[existing] = synth;
    else allChats.unshift(synth);

    filterChats(document.getElementById('search').value);
    selectChat(chatId);

    // Initialize per-chat state for the new chat
    _lsMap[chatId] = Object.assign(_defaultLS(), {
      state: msg.state || 'active',
      max_turns: msg.max_turns || getLs(chatId).max_turns || 0,
      max_context: msg.max_context || 200000,
      permission_mode: msg.permission_mode || 'bypassPermissions',
    });
    if (chatId === activeChatId) {
      liveStatus = _lsMap[chatId];
      updateCmdBar();
    }
  }

  else if (type === 'chat_ended') {
    const chatId = msg.chat_id;
    if (!chatId) return;

    liveChats.delete(chatId);
    getLs(chatId).state = 'ended';
    if (chatId === activeChatId) {
      liveStatus = getLs(chatId);
      updateCmdBar();
      updateHeaderAgents();
    }

    loadChatList().then(() => {
      if (chatId === activeChatId) selectChat(chatId);
    });
  }

  else if (type === 'log_updated') {
    loadChatList().then(() => {
      if (msg.chat_id && msg.chat_id === activeChatId && !liveChats.has(activeChatId)) {
        selectChat(activeChatId);
      }
    });
  }

  // ── New N-agent SSE events ────────────────────────────────────────────────

  else if (type === 'phase_change') {
    const bar = document.getElementById('sync-bar');
    const label = document.getElementById('phase-label');
    if (bar && label) {
      label.textContent = (msg.phase || 'unknown').toUpperCase();
      bar.style.display = '';
    }
  }

  else if (type === 'sync_status') {
    const el = document.getElementById('sync-status');
    if (el) el.textContent = `${msg.count}/${msg.total} synced`;
  }

  else if (type === 'agent_joined') {
    const chatId = msg.chat_id;
    if (chatId !== activeChatId) return;  // ignore other chats
    // Dynamically add a new panel for the joined agent
    const agents = _chatCache[activeChatId] ? (_chatCache[activeChatId].agents || {}) : {};
    const nextKey = String(Object.keys(agents).length);
    agents[nextKey] = { name: msg.agent_name };
    if (_chatCache[activeChatId]) _chatCache[activeChatId].agents = agents;

    const container = document.getElementById('panels-container');
    if (container && container.style.display !== 'none') {
      const idx = parseInt(nextKey, 10);
      const color = AGENT_COLORS_HEX[idx % AGENT_COLORS_HEX.length];
      const panel = document.createElement('div');
      panel.className = 'agent-panel';
      panel.dataset.agent = String(idx);
      panel.dataset.agentName = msg.agent_name;
      panel.innerHTML = `
        <div class="panel-header">
          <span class="panel-agent-name" style="color:${color}">${esc(msg.agent_name)}</span>
          <span class="panel-status">joined</span>
        </div>
        <div class="panel-messages"></div>`;
      container.appendChild(panel);
    }
    updateHeaderAgents();
  }

  else if (type === 'turns_extended') {
    getLs(msg.chat_id).max_turns = msg.new_max || getLs(msg.chat_id).max_turns;
    if (msg.chat_id === activeChatId) { liveStatus = getLs(msg.chat_id); updateCmdBar(); }
  }

  else if (type === 'agent_msg') {
    // Show inter-agent message as a notification in the sender's panel
    const panel = findPanel(msg.from, ' .panel-messages');
    if (panel) {
      const div = document.createElement('div');
      div.className = 'agent-msg-notification';
      div.innerHTML = `<span style="color:var(--muted)">→ @${esc(msg.to)}: ${esc(msg.text || '')}</span>`;
      panel.appendChild(div);
      panel.scrollTop = panel.scrollHeight;
    }
  }

  else if (type === 'report_published') {
    // Show report card in the agent's panel
    const panel = findPanel(msg.agent, ' .panel-messages');
    if (panel) {
      const div = document.createElement('div');
      div.className = 'report-card';
      div.innerHTML = `
        <div class="report-title">${esc(msg.title || 'Report')}</div>
        <div class="report-preview">${esc(msg.preview || '')}</div>
        <div class="report-link" onclick="window.open('http://localhost:8888','_blank')">View in Exchange</div>`;
      panel.appendChild(div);
      panel.scrollTop = panel.scrollHeight;
    }
  }
}

// ── Mode toggles ─────────────────────────────────────────────────────────────
function toggleStepMode() {
  stepMode = !stepMode;
  const btn = document.getElementById('btn-step');
  btn.textContent = stepMode ? 'Step' : 'Live';
  btn.title = stepMode ? 'Step mode (pause after each turn)' : 'Live mode (auto-continue)';
  sendCmd(stepMode ? '/step' : '/live', '');
}

function toggleModeratorMode() {
  moderatorMode = !moderatorMode;
  const btn = document.getElementById('btn-moderator');
  btn.style.opacity = moderatorMode ? '1' : '0.5';
  btn.title = moderatorMode ? 'Moderator ON (you control)' : 'Moderator OFF (orchestrator controls)';
  sendCmd('/moderator', moderatorMode ? 'on' : 'off');
  updateCmdBar();
}

// ── Commands ─────────────────────────────────────────────────────────────────
function sendCmd(cmd, arg) {
  if (!ws || ws.readyState !== WebSocket.OPEN) {
    console.warn('WS not connected, cannot send command');
    return;
  }
  ws.send(JSON.stringify({ type: 'command', cmd, arg, chat_id: activeChatId || '' }));
}

function sendCmdInput() {
  const input = document.getElementById('cmd-input');
  const raw   = input.value.trim();
  if (!raw) return;

  let cmd, arg;
  if (raw.startsWith('/')) {
    const sp = raw.indexOf(' ');
    if (sp === -1) { cmd = raw; arg = ''; }
    else { cmd = raw.slice(0, sp); arg = raw.slice(sp + 1).trim(); }
  } else {
    cmd = '/say';
    arg = raw;
  }

  sendCmd(cmd, arg);
  input.value = '';
  input.style.height = 'auto';  // reset textarea height after send

  // Show sent message locally using same buildTurnHTML as server
  if (cmd === '/say' && arg && activeChatId) {
    const synthTurn = { turn: 0, speaker: 'moderator', text: arg, timestamp: new Date().toISOString() };
    const agents = _chatCache[activeChatId] ? _chatCache[activeChatId].agents : null;

    // Add to cache immediately (prevents loss on chat switch)
    if (_chatCache[activeChatId]) {
      _chatCache[activeChatId].turns = _chatCache[activeChatId].turns || [];
      _chatCache[activeChatId].turns.push(synthTurn);
    }

    // ONE msgId for all panels — dedup relies on this being consistent
    const msgId = 'mod-msg-' + Date.now();
    window._lastModMsgId = msgId;

    // Parse @mention for targeted display
    const mentionMatch = arg.match(/^@(\S+)\s+([\s\S]*)/);
    const targetAgent = mentionMatch ? mentionMatch[1] : null;

    if (isPanelMode()) {
      // Show moderator message in target panel only (or all panels if broadcast)
      const panels = targetAgent
        ? [findPanel(targetAgent, ' .panel-messages')].filter(Boolean)
        : Array.from(document.querySelectorAll('.panel-messages'));

      panels.forEach(pm => {
        const wrapper = document.createElement('div');
        wrapper.innerHTML = buildTurnHTML(synthTurn, agents);
        const modText = wrapper.querySelector('.turn-mod-text');
        if (modText) modText.id = msgId;
        const statusEl = wrapper.querySelector('.msg-status');
        if (statusEl) {
          const checks = statusEl.querySelectorAll('.check');
          if (checks[1]) { checks[1].classList.remove('active'); checks[1].id = msgId + '-d'; }
        }
        while (wrapper.firstChild) pm.appendChild(wrapper.firstChild);
        pm.scrollTop = pm.scrollHeight;
      });
    } else {
      const msgArea = document.getElementById('messages-container');
      if (msgArea) {
        const wrapper = document.createElement('div');
        wrapper.innerHTML = buildTurnHTML(synthTurn, agents);
        const modText = wrapper.querySelector('.turn-mod-text');
        if (modText) modText.id = msgId;
        const statusEl = wrapper.querySelector('.msg-status');
        if (statusEl) {
          const checks = statusEl.querySelectorAll('.check');
          if (checks[1]) { checks[1].classList.remove('active'); checks[1].id = msgId + '-d'; }
        }
        while (wrapper.firstChild) msgArea.appendChild(wrapper.firstChild);
        msgArea.scrollTop = msgArea.scrollHeight;
      }
    }

    if (liveStatus.state === 'paused') {
      const st = document.getElementById('state-text');
      if (st && !st.textContent.includes('queued')) st.innerHTML += ' &middot; message queued';
    }
  }
}

function endChat() {
  if (!activeChatId) return;
  sendCmd('/end', '');
  const chatId = activeChatId;
  setTimeout(async () => {
    if (liveChats.has(chatId)) {
      try {
        await fetch(`/api/chats/${encodeURIComponent(chatId)}/end`, { method: 'POST' });
      } catch (e) { console.error('Force-end failed:', e); }
    }
  }, 5000);
}

function onCmdKey(event) {
  if (event.key === 'Enter' && !event.shiftKey) {
    event.preventDefault();
    sendCmdInput();
  }
  // Shift+Enter: default behavior (newline) — no action needed
}

function autoResizeInput(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

// ── Resizable sidebar ────────────────────────────────────────────────────────
function initResize() {
  const handle  = document.getElementById('resize-handle');
  const sidebar = document.getElementById('sidebar');
  let dragging  = false;
  let startX    = 0;
  let startW    = 0;

  const saved = localStorage.getItem('chat_sidebar_w');
  if (saved) {
    const w = parseInt(saved, 10);
    if (w >= 160 && w <= 500) sidebar.style.width = w + 'px';
  }

  handle.addEventListener('mousedown', (e) => {
    e.preventDefault();
    dragging = true;
    startX = e.clientX;
    startW = sidebar.offsetWidth;
    handle.classList.add('dragging');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
  });

  document.addEventListener('mousemove', (e) => {
    if (!dragging) return;
    const dx = e.clientX - startX;
    let newW = startW + dx;
    newW = Math.max(160, Math.min(500, newW));
    sidebar.style.width = newW + 'px';
  });

  document.addEventListener('mouseup', () => {
    if (!dragging) return;
    dragging = false;
    handle.classList.remove('dragging');
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
    localStorage.setItem('chat_sidebar_w', String(sidebar.offsetWidth));
  });
}

// ── Init ──────────────────────────────────────────────────────────────────────
async function init() {
  initResize();
  updateCmdBar();
  await loadChatList();
  sseConnect();
  wsConnect();
}

document.addEventListener('DOMContentLoaded', init);
</script>
